<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      .upload-box {
        border: 2px dashed #ccc;
        padding: 40px;
        text-align: center;
        border-radius: 8px;
      }
      button {
        background: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #45a049;
      }
      #result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 4px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <h1>File Upload Test</h1>
    <div class="upload-box">
      <input type="file" id="fileInput" accept="image/*" />
      <br /><br />
      <button onclick="uploadFile()">Upload Test File</button>
    </div>
    <div id="result"></div>

    <script>
      async function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const resultDiv = document.getElementById("result");

        if (!fileInput.files[0]) {
          resultDiv.className = "error";
          resultDiv.innerHTML = "Please select a file first!";
          return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
          resultDiv.innerHTML = "Uploading...";
          resultDiv.className = "";

          const response = await fetch(
            "http://localhost:5000/api/test/test-upload",
            {
              method: "POST",
              body: formData,
            },
          );

          const data = await response.json();

          if (response.ok) {
            resultDiv.className = "success";
            resultDiv.innerHTML = `
                        <h3>✅ Upload Successful!</h3>
                        <p><strong>Filename:</strong> ${data.file.filename}</p>
                        <p><strong>Path:</strong> ${data.file.path}</p>
                        <p><strong>File Exists:</strong> ${data.file.exists ? "YES" : "NO"}</p>
                        <p><strong>URL:</strong> ${data.file.url}</p>
                        <p><strong>Check your backend console for detailed logs!</strong></p>
                    `;
          } else {
            throw new Error(data.error || "Upload failed");
          }
        } catch (error) {
          resultDiv.className = "error";
          resultDiv.innerHTML = `
                    <h3>❌ Upload Failed</h3>
                    <p>${error.message}</p>
                `;
        }
      }
    </script>
  </body>
</html>
